[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy all /api/* requests to your Python backend
# IMPORTANT: Replace YOUR_BACKEND_URL with your actual Render/Railway URL after deployment
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "https://YOUR_BACKEND_URL/health"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
